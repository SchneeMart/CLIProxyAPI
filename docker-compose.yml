services:
  cli-proxy-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cli-proxy-api
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
      - "10200:10200"
      - "10300:10300"
      - "10400:10400"
    volumes:
      - /mnt/l/DockerContainer/CLIProxy/config.yaml:/CLIProxyAPI/config.yaml
      - /mnt/l/DockerContainer/CLIProxy/auths:/root/.cli-proxy-api
      - /mnt/l/DockerContainer/CLIProxy/logs:/CLIProxyAPI/logs
      - /mnt/l/DockerContainer/CLIProxy/static:/CLIProxyAPI/static
      - /mnt/l/DockerContainer/CLIProxy/bin/CLIProxyAPI:/CLIProxyAPI/CLIProxyAPI
    restart: unless-stopped
    networks:
      - cliproxy_net
      - shared-network

networks:
  cliproxy_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400
  shared-network:
    external: true
